# wiki-manager 源映射配置
# 定义：哪些飞书 Wiki 节点 / Base 表需要被同步到本地
# 维护方式：手动更新（添加新节点或表时修改此文件）

# ============================================================
# 1. Wiki 文档源配置
# ============================================================
wiki:
  # 飞书 Wiki 空间根配置
  space:
    space_id: "7634845410292403395"  # MCN Compass Wiki 空间 ID
    root_node_token: ""    # TODO: MCN 根节点 token（如果存在统一的根节点）

  # scope 映射规则：按目录路径匹配，决定文档落入 wiki/ 下的哪个 scope
  # 优先级：从上到下匹配，第一个匹配的 rule 生效
  scope_rules:
    - path: "SOP/*"
      scope: "public"
      project_id: null

    - path: "入职指南/*"
      scope: "public"
      project_id: null

    - path: "部门周报/*"
      scope: "dept"
      project_id: null

    - path: "会议纪要/部门级/*"
      scope: "dept"
      project_id: null

    - path: "垂类达人孵化/*"
      scope: "projects"
      project_id: "kol-incubation"

    - path: "品牌代运营/*"
      scope: "projects"
      project_id: "brand-ops"

    - path: "直播电商/*"
      scope: "projects"
      project_id: "live-commerce"

    - path: "短视频内容矩阵/*"
      scope: "projects"
      project_id: "short-video"

    - path: "虚拟IP孵化/*"
      scope: "projects"
      project_id: "virtual-ip"

    - path: "达人私域运营/*"
      scope: "projects"
      project_id: "private-domain"

