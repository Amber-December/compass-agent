# Compass 场景配置 — MCN 事业部
# 场景切换 = 换配置 + 换模板，代码零改动

name: mcn
description: 星澜传媒 MCN 事业部 — 6 个并行项目

# 部门信息
department:
  name: MCN 事业部
  company: 星澜传媒
  project_count: 6

# 项目定义
projects:
  - id: 1
    name: 垂类达人孵化
    pm: ""
    status: active
    kpis:
      - name: 头部达人数量
        field: top_kol_count
        target: 8
        unit: 名
      - name: 月均粉丝增长率
        field: fan_growth_rate
        target: 0.12
        unit: "%"
      - name: 商单转化率
        field: order_conversion_rate
        target: 0.15
        unit: "%"
      - name: 达人月均变现
        field: kol_monthly_revenue
        target: 30000
        unit: 元
    thresholds:
      - metric: incubation_count
        rule: consecutive_below
        periods: 3
        unit: month
        threshold: 0.5
        level: high
        description: 孵化数量 3 个月未达目标 50%
      - metric: fan_growth_rate
        rule: consecutive_below
        periods: 2
        unit: month
        threshold: 0.05
        level: medium
        description: 粉丝增长率连续 2 月 < 5%
      - metric: order_conversion_rate
        rule: absolute_lt
        threshold: 0.08
        level: medium
        description: 商单转化率 < 8%

  - id: 2
    name: 短视频内容矩阵
    pm: ""
    status: active
    kpis:
      - name: 矩阵月播放量
        field: monthly_play_count
        target: 30000000
        unit: 次
      - name: 爆款占比
        field: viral_ratio
        target: 0.08
        unit: "%"
      - name: 月均账号增量
        field: monthly_account_growth
        target: 300000
        unit: 粉丝
      - name: 日均更新
        field: daily_update_count
        target: 10
        unit: 条
    thresholds:
      - metric: monthly_play_count
        rule: consecutive_below
        periods: 2
        unit: month
        threshold: 15000000
        level: high
        description: 播放量连续 2 月 < 1500 万
      - metric: viral_ratio
        rule: absolute_lt
        threshold: 0.03
        level: high
        description: 爆款占比 < 3%
      - metric: daily_update_count
        rule: consecutive_below
        periods: 1
        unit: week
        threshold: 5
        level: medium
        description: 更新频次日均 < 5 条持续 1 周

  - id: 3
    name: 品牌代运营
    pm: ""
    status: active
    kpis:
      - name: 月均新增品牌
        field: new_brand_monthly
        target: 2
        unit: 家
      - name: 客户满意度
        field: customer_satisfaction
        target: 0.90
        unit: "%"
      - name: 单品牌月曝光
        field: brand_monthly_exposure
        target: 5000000
        unit: 次
      - name: 项目月营收
        field: monthly_revenue
        target: 500000
        unit: 元
    thresholds:
      - metric: new_brand_monthly
        rule: absolute_lt
        threshold: 1
        level: medium
        description: 月新增品牌 < 1 家
      - metric: customer_satisfaction
        rule: absolute_lt
        threshold: 0.80
        level: high
        description: 满意度 < 80% 且出现投诉
      - metric: monthly_revenue
        rule: absolute_lt
        threshold: 250000
        level: high
        description: 月营收 < 25 万

  - id: 4
    name: 直播电商
    pm: ""
    status: active
    kpis:
      - name: 月 GMV
        field: monthly_gmv
        target: 800000
        unit: 元
      - name: 直播转化率
        field: live_conversion_rate
        target: 0.05
        unit: "%"
      - name: 场均观看
        field: avg_viewers_per_live
        target: 20000
        unit: 人
      - name: ROI
        field: roi
        target: 3.0
        unit: "1:x"
    thresholds:
      - metric: monthly_gmv
        rule: consecutive_below
        periods: 2
        unit: month
        threshold: 400000
        level: high
        description: GMV 连续 2 月 < 40 万
      - metric: live_conversion_rate
        rule: consecutive_below
        periods: 3
        unit: session
        threshold: 0.02
        level: high
        description: 转化率连续 3 场 < 2%
      - metric: roi
        rule: absolute_lt
        threshold: 1.5
        level: high
        description: ROI < 1:1.5

  - id: 5
    name: 达人私域运营
    pm: ""
    status: active
    kpis:
      - name: 月均私域沉淀
        field: monthly_private_domain_growth
        target: 10000
        unit: 人
      - name: 粉丝活跃度
        field: fan_activity_rate
        target: 0.25
        unit: "%"
      - metric: private_domain_conversion
        target: 0.10
        unit: "%"
      - name: 复购率
        field: repurchase_rate
        target: 0.20
        unit: "%"
    thresholds:
      - metric: monthly_private_domain_growth
        rule: absolute_lt
        threshold: 4000
        level: medium
        description: 月沉淀 < 4000 人
      - metric: fan_activity_rate
        rule: consecutive_below
        periods: 2
        unit: week
        threshold: 0.10
        level: medium
        description: 活跃度连续 2 周 < 10%
      - metric: repurchase_rate
        rule: absolute_lt
        threshold: 0.10
        level: medium
        description: 复购率 < 10%

  - id: 6
    name: 虚拟 IP 孵化与运营
    pm: ""
    status: active
    kpis:
      - name: 上线虚拟 IP 数量
        field: virtual_ip_online_count
        target: 2
        unit: 个
      - name: 虚拟 IP 粉丝总量
        field: virtual_ip_total_fans
        target: 300000
        unit: 粉丝
      - name: 月商业化营收
        field: monthly_commercial_revenue
        target: 150000
        unit: 元
      - name: 直播/短视频互动率
        field: interaction_rate
        target: 0.08
        unit: "%"
      - name: 技术故障率
        field: tech_failure_rate
        target: 0.02
        unit: "%"
    thresholds:
      - metric: virtual_ip_online_count
        rule: absolute_lt
        threshold: 1
        periods: 4
        unit: month
        level: high
        description: 孵化周期超 4 个月未上线
      - metric: virtual_ip_total_fans
        rule: consecutive_below
        periods: 3
        unit: month
        threshold: 100000
        level: high
        description: 粉丝总量 3 个月 < 10 万
      - metric: monthly_commercial_revenue
        rule: absolute_lt
        threshold: 50000
        level: high
        description: 月营收 < 5 万
      - metric: tech_failure_rate
        rule: absolute_gt
        threshold: 0.05
        level: high
        description: 技术故障率 > 5%

# 数据源配置
data_sources:
  base:
    app_token: ""  # 飞书 Base 应用 token
    tables:
      - name: project_kpi
        description: 项目 KPI 数据
      - name: task_list
        description: 任务列表
      - name: kol_profile
        description: 达人档案
  wiki:
    space_id: ""  # MCN 知识库空间 ID
    node_token: ""  # MCN 根节点 token
  minutes:
    search_query: "MCN 选品会 OR MCN 复盘会 OR MCN 客户对接会"
  im:
    chat_ids: []  # 项目群 chat_id 列表

# 推送配置
push:
  weekly_report:
    cron: "0 9 * * 1"  # 每周一 9:00
    project_chat_ids: []  # 项目群
    dept_chat_id: ""  # 部门群
  dept_board:
    cron: "5 9 * * 1"  # 每周一 9:05
    chat_id: ""  # 部门群

# Top3 精选评分权重
top3_scoring:
  type_weight: 0.4
  timeliness_weight: 0.25
  cross_project_weight: 0.25
  completeness_weight: 0.1
